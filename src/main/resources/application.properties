quarkus.langchain4j.anthropic.api-key=${ANTHROPIC_API_KEY}
quarkus.langchain4j.anthropic.chat-model.model-name=claude-sonnet-4-20250514
quarkus.langchain4j.anthropic.chat-model.max-tokens=1024
quarkus.langchain4j.anthropic.chat-model.temperature=0.7
quarkus.langchain4j.anthropic.timeout=60s

# Round 2: persistent chat memory — message-window, file-backed store bean
quarkus.langchain4j.chat-memory.type=message-window
quarkus.langchain4j.chat-memory.memory-window.max-messages=20

# Round 3: MCP — hosted developer-events server (streamable HTTP at /mcp)
quarkus.langchain4j.mcp.events.transport-type=streamable-http
quarkus.langchain4j.mcp.events.url=https://developer-events-mcp-54127830651.europe-west2.run.app/mcp
quarkus.langchain4j.mcp.events.log-requests=true
quarkus.langchain4j.mcp.events.log-responses=true

quarkus.langchain4j.anthropic.log-requests=true
quarkus.langchain4j.anthropic.log-responses=true
quarkus.log.category."dev.langchain4j".level=DEBUG
quarkus.log.category."io.quarkiverse.langchain4j".level=DEBUG

quarkus.http.port=8080
